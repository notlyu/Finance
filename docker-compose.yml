version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/finance_db?schema=public"
      PORT: 5000
      JWT_SECRET: test_jwt_secret
    ports:
      - '5000:5000'
    command: bash -lc 'npm run dev:all'
volumes:
  pgdata:
