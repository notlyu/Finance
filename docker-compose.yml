version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-finance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finance_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-finance_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENABLE_RECURRING_JOB: ${ENABLE_RECURRING_JOB:-true}
      ENABLE_INTEREST_JOB: ${ENABLE_INTEREST_JOB:-true}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - finance_network

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: finance_frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: /api
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - finance_network

volumes:
  postgres_data:

networks:
  finance_network:
    driver: bridge
