name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance_db
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Generate Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_db
      - name: Migrate
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_db
      - name: Seed
        run: node scripts/prisma-seed.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finance_db
      - name: Jest tests
        run: npm test

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Start server
        run: |
          node server.js &
          sleep 5
      - name: Smoke tests
        run: npm run test:smoke
        env:
          CI: true

  e2e:
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Install Playwright
        run: npx playwright install --with-deps
      - name: Start server
        run: |
          node server.js &
          sleep 5
      - name: Playwright tests
        run: npx playwright test
        env:
          CI: true