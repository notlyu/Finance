<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Новое обязательство - Architectural Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#171c1f",
                      "inverse-surface": "#2c3134",
                      "background": "#f6fafe",
                      "primary-fixed": "#d6e3ff",
                      "error-container": "#ffdad6",
                      "tertiary": "#71382f",
                      "primary": "#00488d",
                      "error": "#ba1a1a",
                      "surface-container": "#eaeef2",
                      "on-tertiary-container": "#ffd1c9",
                      "secondary-container": "#c2e9c9",
                      "on-secondary-fixed-variant": "#2c4e36",
                      "on-secondary-fixed": "#00210e",
                      "surface-container-low": "#f0f4f8",
                      "on-primary": "#ffffff",
                      "on-error": "#ffffff",
                      "primary-container": "#005fb8",
                      "tertiary-fixed": "#ffdad4",
                      "surface-dim": "#d6dade",
                      "tertiary-container": "#8d4f45",
                      "surface-container-lowest": "#ffffff",
                      "on-surface-variant": "#424752",
                      "outline-variant": "#c2c6d4",
                      "on-primary-container": "#cadcff",
                      "surface-container-highest": "#dfe3e7",
                      "on-surface": "#171c1f",
                      "surface-bright": "#f6fafe",
                      "surface": "#f6fafe",
                      "on-secondary": "#ffffff",
                      "on-error-container": "#93000a",
                      "on-primary-fixed-variant": "#00468b",
                      "surface-tint": "#005db5",
                      "on-tertiary-fixed-variant": "#6f362e",
                      "outline": "#727783",
                      "on-secondary-container": "#486a51",
                      "secondary": "#43664d",
                      "secondary-fixed": "#c5eccc",
                      "on-tertiary": "#ffffff",
                      "inverse-on-surface": "#edf1f5",
                      "surface-variant": "#dfe3e7",
                      "secondary-fixed-dim": "#a9d0b1",
                      "on-primary-fixed": "#001b3d",
                      "tertiary-fixed-dim": "#ffb4a8",
                      "surface-container-high": "#e4e9ed",
                      "primary-fixed-dim": "#a8c8ff",
                      "on-tertiary-fixed": "#380c07",
                      "inverse-primary": "#a8c8ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              }
            },
          }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- Background: Blurred Loans and Debts Screen -->
<div class="fixed inset-0 overflow-hidden pointer-events-none select-none blur-md scale-105 opacity-40">
<!-- TopNavBar Mock -->
<header class="bg-[#f6fafe]/80 flex items-center justify-between px-8 h-20 w-full font-inter antialiased tracking-tight">
<span class="text-xl font-bold tracking-tighter text-[#00488d]">Architectural Ledger</span>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-500">notifications</span>
<span class="material-symbols-outlined text-slate-500">settings</span>
<div class="w-10 h-10 rounded-full bg-slate-200"></div>
</div>
</header>
<div class="flex">
<!-- SideNavBar Mock -->
<aside class="flex flex-col p-6 space-y-8 h-screen w-72 bg-[#f6fafe]/90 border-r border-slate-100/10">
<div class="flex items-center gap-3">
<div class="w-8 h-8 bg-primary rounded-lg"></div>
<div>
<div class="text-lg font-black tracking-widest uppercase text-[#00488d]">The Ledger</div>
<div class="text-xs text-slate-400">Digital Curator</div>
</div>
</div>
<nav class="space-y-4">
<div class="flex items-center gap-3 text-slate-500 px-4 py-3"><span class="material-symbols-outlined">grid_view</span> Dashboard</div>
<div class="flex items-center gap-3 text-[#005FB8] bg-white rounded-[0.75rem] px-4 py-3 shadow-sm"><span class="material-symbols-outlined">receipt_long</span> Transactions</div>
</nav>
</aside>
<!-- Content Area Mock -->
<main class="flex-1 p-12 space-y-8">
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface">Кредиты и долги</h1>
<div class="grid grid-cols-3 gap-8">
<div class="bg-surface-container-lowest p-8 rounded-xl h-64 shadow-sm border border-outline-variant/15"></div>
<div class="bg-surface-container-lowest p-8 rounded-xl h-64 shadow-sm border border-outline-variant/15"></div>
<div class="bg-surface-container-lowest p-8 rounded-xl h-64 shadow-sm border border-outline-variant/15"></div>
</div>
<div class="bg-surface-container-low p-8 rounded-xl h-96"></div>
</main>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-on-background/20 backdrop-blur-sm p-4">
<!-- Modal Window -->
<div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl shadow-[0px_24px_48px_-12px_rgba(23,28,31,0.12)] overflow-hidden">
<!-- Modal Header -->
<div class="px-8 py-6 flex items-center justify-between">
<h2 class="text-xl font-bold tracking-tight text-primary">Новое обязательство</h2>
<button class="text-outline hover:text-on-surface transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content (Form) -->
<form action="#" class="px-8 pb-8 space-y-6">
<!-- Title & Type -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Название</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-outline" placeholder="Например: Ипотека" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Тип обязательства</label>
<div class="flex p-1 bg-surface-container-low rounded-xl">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-surface-container-lowest text-primary shadow-sm" type="button">Кредит</button>
<button class="flex-1 py-2 text-sm font-medium text-on-surface-variant hover:text-on-surface transition-all" type="button">Долг</button>
</div>
</div>
</div>
<!-- Amounts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Общая сумма</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline text-sm">₽</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Остаток</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline text-sm">₽</span>
</div>
</div>
</div>
<!-- Rate & Payment -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Процентная ставка</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="0.0" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline text-sm">%</span>
</div>
</div>
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Ежемесячный платёж</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="0.00" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline text-sm">₽</span>
</div>
</div>
</div>
<!-- Date & Automation -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Дата начала</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm text-on-surface" type="date"/>
</div>
<div class="flex items-center gap-3 pt-6">
<input class="w-5 h-5 rounded-[0.5rem] border-none bg-surface-container-low text-primary focus:ring-primary/20" id="regular_payment" type="checkbox"/>
<label class="text-xs font-medium text-on-surface-variant leading-tight" for="regular_payment">Создать регулярный платёж для погашения</label>
</div>
</div>
<!-- Notes -->
<div class="space-y-2">
<label class="block text-[10px] font-bold tracking-[0.05em] uppercase text-on-surface-variant">Заметки</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 text-sm placeholder:text-outline resize-none" placeholder="Дополнительная информация об обязательстве..." rows="3"></textarea>
</div>
<!-- Buttons -->
<div class="flex items-center justify-end gap-4 pt-4">
<button class="px-6 py-3 text-sm font-semibold text-on-primary-fixed-variant bg-surface-container-high rounded-xl hover:bg-surface-dim transition-all" type="button">Отмена</button>
<button class="px-8 py-3 text-sm font-bold text-white bg-gradient-to-br from-primary to-primary-container rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all" type="submit">Сохранить</button>
</div>
</form>
</div>
</div>
</body></html>
